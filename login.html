<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSCICC | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body class="h-full smooth-scroll bg-gray-50">

  <button class="dark-toggle" id="darkToggle" title="Toggle Dark Mode">🌙</button>

  <!-- Navigation -->
  <nav class="sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex flex-wrap justify-center items-center gap-4">
        <a href="index.html" class="text-yellow-400 hover:text-white transition-colors duration-300 font-medium text-sm px-3 py-1">Home</a>
        <a href="about.html" class="text-yellow-400 hover:text-white transition-colors duration-300 font-medium text-sm px-3 py-1">About</a>
        <a href="activities.html" class="text-yellow-400 hover:text-white transition-colors duration-300 font-medium text-sm px-3 py-1">Activities</a>
        <a href="signup.html" class="bg-green-600 text-white hover:bg-green-500 transition-colors duration-300 font-bold text-sm px-4 py-2 rounded-lg">📝 Sign Up</a>
        <a href="login.html" class="bg-yellow-400 text-green-900 hover:bg-yellow-300 transition-colors duration-300 font-bold text-sm px-4 py-2 rounded-lg">🔑 Login</a>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <div class="gradient-bg islamic-pattern py-12 text-center text-white">
    <h1 class="text-4xl font-bold text-yellow-400 mb-2">লগইন করুন</h1>
    <p class="opacity-80">আপনার একাউন্টে প্রবেশ করুন</p>
  </div>

  <!-- Login Form -->
  <section class="py-16 bg-gray-50">
    <div class="max-w-md mx-auto px-6">
      <div class="bg-white rounded-2xl shadow-xl p-8 border-t-4 border-yellow-400">
        <div class="text-center mb-8">
          <div class="w-20 h-20 mx-auto bg-yellow-100 rounded-full flex items-center justify-center text-4xl mb-4">🔑</div>
          <h2 class="text-2xl font-bold text-gray-800">সদস্য লগইন</h2>
          <p class="text-gray-500 text-sm mt-2">ইমেইল ও পাসওয়ার্ড দিন</p>
        </div>

        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">ইমেইল</label>
            <input type="email" id="login-email" placeholder="example@gmail.com"
                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-yellow-400 focus:outline-none transition" required>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">পাসওয়ার্ড</label>
            <input type="password" id="login-password" placeholder="পাসওয়ার্ড দিন"
                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-yellow-400 focus:outline-none transition" required>
          </div>

          <button type="submit" id="login-btn"
                  class="w-full bg-yellow-400 text-green-900 font-bold py-4 rounded-lg hover:bg-yellow-300 transition-all duration-300 shadow-lg text-lg flex items-center justify-center gap-2">
            <span id="login-text">🔓 লগইন করুন</span>
            <span id="login-loading" class="hidden flex items-center gap-2">
              <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              লগইন হচ্ছে...
            </span>
          </button>
        </form>

        <div id="login-message" class="mt-4 text-center text-sm font-medium hidden"></div>

        <!-- Forgot Password -->
        <div class="text-center mt-4">
          <button id="forgot-btn" class="text-green-700 text-sm hover:underline">পাসওয়ার্ড ভুলে গেছেন?</button>
        </div>

        <!-- Sign Up Link -->
        <div class="text-center mt-6 pt-6 border-t border-gray-200">
          <p class="text-gray-600 text-sm">একাউন্ট নেই?
            <a href="signup.html" class="text-green-700 font-bold hover:underline">রেজিস্ট্রেশন করুন</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-900 text-white py-10 text-center">
    <div class="max-w-6xl mx-auto px-6">
      <h3 class="text-2xl font-bold text-yellow-400 mb-4">GSC Islamic Cultural Club</h3>
      <p class="opacity-70 mb-6">সরকারি বিজ্ঞান কলেজ, ঢাকা।</p>
      <hr class="border-gray-700 mb-6">
      <p class="text-sm opacity-50">&copy; 2024 GSCICC | Developed by <span class="text-yellow-400">MD Samin Ismail</span></p>
    </div>
  </footer>

  <script src="firebase-config.js"></script>
  <script>
    // Login Handler
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      var loginText = document.getElementById('login-text');
      var loginLoading = document.getElementById('login-loading');
      var loginBtn = document.getElementById('login-btn');
      var msgEl = document.getElementById('login-message');

      loginText.classList.add('hidden');
      loginLoading.classList.remove('hidden');
      loginBtn.disabled = true;

      var email = document.getElementById('login-email').value;
      var password = document.getElementById('login-password').value;

      auth.signInWithEmailAndPassword(email, password)
        .then(function(userCredential) {
          msgEl.innerHTML = '✅ <strong>লগইন সফল!</strong> ড্যাশবোর্ডে যাচ্ছেন...';
          msgEl.className = 'mt-4 text-center text-sm font-medium text-green-700 bg-green-50 p-4 rounded-lg border border-green-200';
          msgEl.classList.remove('hidden');

          setTimeout(function() {
            window.location.href = 'dashboard.html';
          }, 1500);
        })
        .catch(function(error) {
          var errorMsg = '';
          switch(error.code) {
            case 'auth/user-not-found':
              errorMsg = 'এই ইমেইলে কোনো একাউন্ট নেই। <a href="signup.html" class="underline font-bold">রেজিস্ট্রেশন করুন</a>';
              break;
            case 'auth/wrong-password':
              errorMsg = 'ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।';
              break;
            case 'auth/invalid-credential':
              errorMsg = 'ভুল ইমেইল বা পাসওয়ার্ড!';
              break;
            default:
              errorMsg = 'সমস্যা: ' + error.message;
          }
          msgEl.innerHTML = '❌ ' + errorMsg;
          msgEl.className = 'mt-4 text-center text-sm font-medium text-red-700 bg-red-50 p-4 rounded-lg border border-red-200';
          msgEl.classList.remove('hidden');
        })
        .finally(function() {
          loginText.classList.remove('hidden');
          loginLoading.classList.add('hidden');
          loginBtn.disabled = false;
        });
    });

    // Forgot Password
    document.getElementById('forgot-btn').addEventListener('click', function() {
      var email = document.getElementById('login-email').value;
      var msgEl = document.getElementById('login-message');

      if (!email) {
        msgEl.innerHTML = '⚠️ প্রথমে ইমেইল ফিল্ডে আপনার ইমেইল লিখুন, তারপর এই বাটনে ক্লিক করুন।';
        msgEl.className = 'mt-4 text-center text-sm font-medium text-yellow-700 bg-yellow-50 p-4 rounded-lg border border-yellow-200';
        msgEl.classList.remove('hidden');
        return;
      }

      auth.sendPasswordResetEmail(email)
        .then(function() {
          msgEl.innerHTML = '📧 পাসওয়ার্ড রিসেট লিংক পাঠানো হয়েছে! ইমেইল চেক করুন।';
          msgEl.className = 'mt-4 text-center text-sm font-medium text-green-700 bg-green-50 p-4 rounded-lg border border-green-200';
          msgEl.classList.remove('hidden');
        })
        .catch(function(error) {
          msgEl.innerHTML = '❌ ' + error.message;
          msgEl.className = 'mt-4 text-center text-sm font-medium text-red-700 bg-red-50 p-4 rounded-lg border border-red-200';
          msgEl.classList.remove('hidden');
        });
    });

    // Dark Mode
    var darkToggle = document.getElementById('darkToggle');
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
      darkToggle.textContent = '☀️';
    }
    darkToggle.addEventListener('click', function() {
      document.body.classList.toggle('dark-mode');
      var isDark = document.body.classList.contains('dark-mode');
      darkToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('darkMode', isDark);
    });
  </script>
</body>
</html>
